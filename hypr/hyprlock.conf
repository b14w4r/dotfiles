# Cache Folder
$ml4w_cache_folder = $HOME/.cache/ml4w/hyprland-dotfiles

# Source colors
source = colors.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/herbobra/.config/hypr/lockscreen.jpg
    # path = /home/herbobra/Pictures/Wallpaper/hyprland-2.png
    # path = $ml4w_cache_folder/blurred_wallpaper.png
}

# Поле ввода пароля
input-field {
    monitor =
    size = 300, 40
    dots_size = 0.25 # Чуть меньше точки для аккуратности
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(255, 255, 255, 0.1) # Полупрозрачный фон как на скриншоте
    font_color = $on_primary
    font_family = Iosevka Light
    outer_color = rgba(0, 0, 0, 0) # Убираем внешнюю рамку
    outline_thickness = 0
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##555555">  Password...</span></i>
    hide_input = false
    rounding = 8 # Слегка скругленные углы
    check_color = $primary
    fail_color = $error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -50 # Смещение вниз от центра
    halign = center
    valign = center
    shadow_passes = 0 # Убираем тени для большей плоскости
}

# Часы (крупные по центру)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0) # Серый цвет, похожий на референс
    font_size = 100
    font_family = Iosevka Light
    position = 0, 120 # Смещение вверх от центра
    halign = center
    valign = center
    shadow_passes = 0
}

# Дата (под часами)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%a, %d %b %Y")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 20
    font_family = Iosevka Light
    position = 0, 40 # Между часами и полем ввода
    halign = center
    valign = center
    shadow_passes = 0
}

# Пользователь (в правом нижнем углу)
label {
    monitor =
    text = $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 14
    font_family = Iosevka Light
    position = -30, 20 # В правом нижнем углу
    halign = right
    valign = bottom
    shadow_passes = 0
}
